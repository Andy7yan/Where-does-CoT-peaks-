experiment:
  run_id: "peak-cot-stage1-gsm8k-llama31"
  seed: 42

dataset:
  name: "gsm8k"
  split: "test"
  subset_size: 200
  subset_hash_seed: 42

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  dtype: "float16"
  hf_cache: "${SCRATCH}/hf-home/hub"

generation:
  num_icl_groups: 5
  samples_per_group: 3
  temperature: 0.7
  icl_groups:
    icl_minimal: { samples_per_group: 3 }
    icl_short: { samples_per_group: 3 }
    icl_medium: { samples_per_group: 3 }
    icl_detailed: { samples_per_group: 5 }
    icl_verbose: { samples_per_group: 5 }
  max_new_tokens: 544

step_segmentation:
  method: "newline"
  strip_whitespace: true
  drop_empty: true
  answer_markers: ["####", "The answer is"]

answer_extraction:
  method: "marker_then_regex"
  numeric_tolerance: 1e-3

nldd:
  corruption_type: "arithmetic_perturbation"
  integer_perturbation: "+/-1"
  float_perturbation_range: [0.5, 0.9, 1.1, 1.5]
  corruption_token_delta_max: 2
  corruption_retry_limit: 3
  ld_epsilon: 1.0e-6
  horizon_definition: "peak"

pilot:
  num_questions: 50
  num_icl_groups: 5
  samples_per_group: 15
  temperature: 0.7
  max_new_tokens: 512
  max_extraction_fail_rate: 0.05

tas:
  layer: "middle"
  plateau_threshold: 0.05

analysis:
  min_bin_size: 5
  num_full_analysis_questions: 25  # Backfill after pilot review.
  num_spot_checks: 3
  max_extraction_fail_rate: 0.05

output:
  base_dir: "${SCRATCH}/runs/${RUN_NAME}"
