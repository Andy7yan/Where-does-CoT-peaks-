  - user: "Caleb bought 10 cartons of ice cream and 4 cartons of frozen yoghurt. Each carton of ice cream cost $4 and each carton of frozen yoghurt cost $1. How much more did Caleb spend on ice cream than on frozen yoghurt?"
    assistant: |
      The ice cream cost 10 * 4 = <<10*4=40>>40 dollars.
      The frozen yoghurt cost 4 * 1 = <<4*1=4>>4 dollars.
      Caleb spent 40 - 4 = <<40-4=36>>36 dollars more on ice cream.
      #### 36

  - user: "Jack has a stack of books that is 12 inches thick. He knows from experience that 80 pages is one inch thick. If he has 6 books, how many pages is each one on average?"
    assistant: |
      Since 80 pages make 1 inch, 12 inches contain 80 * 12 = <<80*12=960>>960 pages.
      Jack has 6 books total.
      So each book has 960 / 6 = <<960/6=160>>160 pages on average.
      #### 160

  - user: "Jimmy bought 3 pens for school for $1 each, 4 notebooks for $3 each and 2 folders for $5 each. If he paid with a $50 bill, how much change will he get back?"
    assistant: |
      The pens cost 3 * 1 = <<3*1=3>>3 dollars.
      The notebooks cost 4 * 3 = <<4*3=12>>12 dollars.
      The folders cost 2 * 5 = <<2*5=10>>10 dollars.
      Altogether, Jimmy spent 3 + 12 + 10 = <<3+12+10=25>>25 dollars.
      His change is 50 - 25 = <<50-25=25>>25 dollars.
      #### 25

  - user: "Sarah's age is equal to three times Mark's age minus 4. Mark is four years older than Billy. Billy is half Ana's age. If Ana will be 15 in 3 years, how old is Sarah?"
    assistant: |
      Ana is 15 - 3 = <<15-3=12>>12 years old now.
      Billy is half of Ana's age, so Billy is 12 / 2 = <<12/2=6>>6.
      Mark is 4 years older than Billy, so Mark is 6 + 4 = <<6+4=10>>10.
      Sarah is three times Mark's age minus 4, so Sarah is 3 * 10 - 4 = <<3*10-4=26>>26.
      #### 26

  - user: "Johnny is a dog walker. He can walk 3 dogs at once. He gets paid $15 for a 30-minute walk and $20 for a 60-minute walk. Johnny works for 4 hours per day. If he always walks the maximum number of dogs possible and 6 dogs have 60-minute walks per day, how much money does he make in a week where he works 5 days?"
    assistant: |
      Johnny walks 3 dogs at once, so 6 dogs having 60-minute walks means 6 / 3 = <<6/3=2>>2 one-hour walks.
      Those walks take 2 hours and earn 6 * 20 = <<6*20=120>>120 dollars.
      He works 4 hours total, so he has 4 - 2 = <<4-2=2>>2 hours left.
      In 2 hours, he can do 120 / 30 = <<120/30=4>>4 half-hour walks, covering 4 * 3 = <<4*3=12>>12 dogs.
      Those dogs earn 12 * 15 = <<12*15=180>>180 dollars.
      So he makes 120 + 180 = <<120+180=300>>300 dollars per day and 300 * 5 = <<300*5=1500>>1500 dollars per week.
      #### 1500

  - user: "There are 360 balls in the ball pit. If a quarter of the balls in the ball pit are red and a fifth of the remaining balls are blue. How many of the balls are neither red nor blue?"
    assistant: |
      A quarter of 360 balls are red, so there are 360 * 1/4 = <<360*(1/4)=90>>90 red balls.
      That leaves 360 - 90 = <<360-90=270>>270 balls.
      A fifth of the remaining balls are blue, so there are 270 * 1/5 = <<270*(1/5)=54>>54 blue balls.
      The number that are neither red nor blue is 360 - 90 - 54 = <<360-90-54=216>>216.
      #### 216

  - user: "Mason is mixing up some salad dressing. He takes a bowl that holds 150 ml and fills it 2/3rds with oil and 1/3rd with vinegar. The oil weighs 5 g/ml and the vinegar weighs 4 g/ml. How many grams does the salad dressing weigh?"
    assistant: |
      The bowl holds 150 ml.
      Oil takes 2/3 of the bowl, so the oil volume is 150 * 2/3 = <<150*2/3=100>>100 ml.
      Vinegar takes 1/3 of the bowl, so the vinegar volume is 150 * 1/3 = <<150*1/3=50>>50 ml.
      The oil weighs 100 * 5 = <<100*5=500>>500 grams.
      The vinegar weighs 50 * 4 = <<50*4=200>>200 grams.
      The total weight is 500 + 200 = <<500+200=700>>700 grams.
      #### 700

  - user: "Aryan owes Fernanda $1200, which is twice what Kyro owes Fernanda. Aryan decides to pay 60% of her debt to Fernanda, and Kyro pays Fernanda 80% of her dept. If Fernanda had $300 in her savings account and adds the money she's been paid by her debtors to the savings account, calculate the total amount of money in her savings account now."
    assistant: |
      Aryan owes 1200 dollars, which is twice what Kyro owes.
      So Kyro owes 1200 / 2 = <<1200/2=600>>600 dollars.
      Aryan pays 60% of 1200, which is 1200 * 60/100 = <<1200*60/100=720>>720 dollars.
      Kyro pays 80% of 600, which is 600 * 80/100 = <<600*80/100=480>>480 dollars.
      Fernanda starts with 300 dollars, so she now has 300 + 720 + 480 = <<300+720+480=1500>>1500 dollars.
      #### 1500

