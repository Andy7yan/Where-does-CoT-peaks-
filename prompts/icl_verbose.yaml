      First combine 2d and d to get 3d.
      Then 3d + d / 2 = 3.5d.
      So 3.5d = 105.
      Divide both sides by 3.5.
      That gives d = <<105/3.5=30>>30.
      #### 30

  - user: "Maria invited 4 of her friends over for a water balloon fight in the backyard. At the start of the game, Maria gave each of her friends 2 water balloons. She had one water balloon for herself. Then her mom came out and gave each person 3 more balloons. How many total balloons did the girls have?"
