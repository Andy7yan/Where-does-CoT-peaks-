  - user: "A bus has a capacity of 200 people. When it departed Chengli city, it had 20 people. On the first stop, 40 people entered the bus. On the second station, 3/4 of the total number of people who entered the bus at the first station entered the bus. If the number of passengers on the bus doubled at the third station, calculate the total number of people required to fill the remaining spaces on the bus."
    assistant: |
      The bus has room for 200 people in total.
      It starts with 20 people already on it.
      At the first stop, 40 more people enter.
      So after the first stop, the bus has 20 + 40 = <<20+40=60>>60 people.
      At the second stop, the number of new passengers is 3/4 of the 40 people who entered at the first stop.
      That is 3/4 * 40 = <<3/4*40=30>>30 people.
      So after the second stop, the bus has 60 + 30 = <<60+30=90>>90 people.
      At the third stop, the number of passengers doubles.
      So the bus then has 90 * 2 = <<90*2=180>>180 people.
      The remaining spaces are 200 - 180 = <<200-180=20>>20.
      #### 20

  - user: "The rug is 5 feet wider than the chair. The couch is 2 feet longer than twice the width of the rug. If the chair is 3 feet wide. How many feet long is the couch?"
