      She also uses 4 eggs to bake muffins for her friends.
      So the total number of eggs she uses before selling any is 3 + 4 = <<3+4=7>>7.
      That means the number of eggs left to sell is 16 - 7 = <<16-7=9>>9.
      Each of those eggs sells for 2 dollars.
      So the total money she makes is 9 * 2 = <<9*2=18>>18 dollars.
