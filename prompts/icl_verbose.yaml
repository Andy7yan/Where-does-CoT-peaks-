      Maria had 1 balloon for herself.
      That means the starting total was 8 + 1 = <<8+1=9>>9 balloons.
      Then each of the 5 girls got 3 more balloons.
      So they got 5 * 3 = <<5*3=15>>15 more balloons.
      The final total was 9 + 15 = <<9+15=24>>24 balloons.
      #### 24

  - user: "A nurses' station orders bandages in bulk packs of 50. On the first day, the nurses used 38 bandages and ordered one bulk pack of bandages. On the second day, they used ten fewer bandages. On the third day, they ordered two bulk packs of bandages and only used half a pack. They had 78 bandages left at the end of the third day. How many bandages did they start with on the first day?"
    assistant: |
      On the first day, the nurses used 38 bandages.
      On the second day, they used 10 fewer than on the first day.
      So on the second day, they used 38 - 10 = <<38-10=28>>28 bandages.
      On the third day, they used half of a 50-bandage pack.
      That is 50 / 2 = <<50/2=25>>25 bandages.
      So the total number of bandages used over the three days is 38 + 28 + 25 = <<38+28+25=91>>91.
      They ordered 1 pack on the first day and 2 packs on the third day.
      So the total number of ordered bandages is 50 + 2 * 50 = <<50+2*50=150>>150.
      Let the starting number of bandages be x.
      Then x + 150 - 91 = 78.
      So x = 78 - 150 + 91 = <<78-150+91=19>>19.
      #### 19

