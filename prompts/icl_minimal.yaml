prompt_id: "icl_minimal"
version: 1
system: |
  You are a careful math tutor.
  Solve the user's problem as briefly as possible.
  Prefer giving the answer directly; at most use one short calculation line before the final answer.
  Finish with a new line in the form "#### <number>".
few_shot:
  - user: "Caleb bought 10 cartons of ice cream and 4 cartons of frozen yoghurt. Each carton of ice cream cost $4 and each carton of frozen yoghurt cost $1. How much more did Caleb spend on ice cream than on frozen yoghurt?"
    assistant: |
      Caleb spent 10 * 4 - 4 * 1 = <<10*4-4*1=36>>36 more on ice cream.
      #### 36

  - user: "Jack has a stack of books that is 12 inches thick. He knows from experience that 80 pages is one inch thick. If he has 6 books, how many pages is each one on average?"
    assistant: |
      The average is 12 * 80 / 6 = <<12*80/6=160>>160 pages per book.
      #### 160

  - user: "Jimmy bought 3 pens for school for $1 each, 4 notebooks for $3 each and 2 folders for $5 each. If he paid with a $50 bill, how much change will he get back?"
    assistant: |
      His change is 50 - (3 * 1 + 4 * 3 + 2 * 5) = <<50-(3*1+4*3+2*5)=25>>25.
      #### 25

  - user: "Sarah's age is equal to three times Mark's age minus 4. Mark is four years older than Billy. Billy is half Ana's age. If Ana will be 15 in 3 years, how old is Sarah?"
    assistant: |
      Sarah is 3 * ((15 - 3) / 2 + 4) - 4 = <<3*((15-3)/2+4)-4=26>>26 years old.
      #### 26

  - user: "Johnny is a dog walker. He can walk 3 dogs at once. He gets paid $15 for a 30-minute walk and $20 for a 60-minute walk. Johnny works for 4 hours per day. If he always walks the maximum number of dogs possible and 6 dogs have 60-minute walks per day, how much money does he make in a week where he works 5 days?"
    assistant: |
      He makes 5 * (6 * 20 + ((4 - 2) * 60 / 30) * 3 * 15) = <<5*(6*20+((4-2)*60/30)*3*15)=1500>>1500.
      #### 1500

  - user: "There are 360 balls in the ball pit. If a quarter of the balls in the ball pit are red and a fifth of the remaining balls are blue. How many of the balls are neither red nor blue?"
    assistant: |
      The number that are neither red nor blue is 360 - 360 / 4 - (360 - 360 / 4) / 5 = <<360-360/4-(360-360/4)/5=216>>216.
      #### 216

  - user: "Mason is mixing up some salad dressing. He takes a bowl that holds 150 ml and fills it 2/3rds with oil and 1/3rd with vinegar. The oil weighs 5 g/ml and the vinegar weighs 4 g/ml. How many grams does the salad dressing weigh?"
    assistant: |
      The dressing weighs 150 * 2 / 3 * 5 + 150 * 1 / 3 * 4 = <<150*2/3*5+150*1/3*4=700>>700 grams.
      #### 700

  - user: "Aryan owes Fernanda $1200, which is twice what Kyro owes Fernanda. Aryan decides to pay 60% of her debt to Fernanda, and Kyro pays Fernanda 80% of her dept. If Fernanda had $300 in her savings account and adds the money she's been paid by her debtors to the savings account, calculate the total amount of money in her savings account now."
    assistant: |
      Fernanda now has 300 + 1200 * 0.6 + (1200 / 2) * 0.8 = <<300+1200*0.6+(1200/2)*0.8=1500>>1500.
      #### 1500

user_template: "{question}"