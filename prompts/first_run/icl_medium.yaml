system: 'You are a careful math tutor.

  Solve the user''s problem clearly and finish with a new line in the form "#### <number>".'
few_shot:
- user: In a yard, the number of tanks is five times the number of trucks. If there are 20 trucks in the yard, calculate the total number of tanks and trucks in the yard.
  assistant: 'There are 20 trucks in the yard.

    The number of tanks is 5 times the number of trucks.

    So the number of tanks is 5 * 20 = 100.

    The total number of vehicles is 100 + 20 = 120.

    So there are 120 tanks and trucks in the yard.

    #### 120'
- user: A fruit basket consists of 4 bananas, 3 apples, 24 strawberries, 2 avocados, and a bunch of grapes. One banana costs $1. An apple costs $2. 12 strawberries cost $4. An avocado costs $3, and half a bunch of grapes costs $2. What is the total cost of the fruit basket?
  assistant: 'The bananas cost 4 * 1 = 4 dollars.

    The apples cost 3 * 2 = 6 dollars.

    Since 24 strawberries are 2 groups of 12, the strawberries cost 2 * 4 = 8 dollars.

    The avocados cost 2 * 3 = 6 dollars.

    A full bunch of grapes costs 2 * 2 = 4 dollars, so the total is 4 + 6 + 8 + 6 + 4 = 28 dollars.

    #### 28'
- user: Carl is figuring out how much he'll need to spend on gas for his upcoming road trip to the Grand Canyon. His car gets 30 miles per gallon in cities and 40 miles per gallon on the highway. The distance from his house to the Grand Canyon, one way, is 60 city miles and 200 highway miles. If gas costs $3.00 per gallon, how much will Carl need to spend?
  assistant: 'Carl uses 60 / 30 = 2 gallons for the city part of one way.

    He uses 200 / 40 = 5 gallons for the highway part of one way.

    So one-way gas use is 2 + 5 = 7 gallons.

    Because the distance is given one way, the round trip needs 7 * 2 = 14 gallons.

    At 3 dollars per gallon, Carl spends 14 * 3 = 42 dollars.

    #### 42'
- user: You can lower the price by 20% if you buy more than fifteen units of iPhone cases. If you pay $500 to buy 18 units, what is the original price?
  assistant: 'Buying 18 units qualifies for the 20% discount.

    A 20% discount means the buyer pays 100% - 20% = 80% of the original price.

    So 80% of the original total price is 500.

    That means original total price = 500 / 0.8 = 625.

    So the original price is 625 dollars.

    #### 625'
- user: The first tree grows 1 meter/day, the second grows the same amount in half the time, the third grows 2 meters/day, and the fourth tree grows a meter more than the third each day. How many meters did the trees grow in total in 4 days?
  assistant: 'In 4 days, the 1st tree grows 1 * 4 = 4 meters.

    The 2nd tree grows the same amount in half the time, so its rate is 2 meters per day and it grows 2 * 4 = 8 meters.

    The 3rd tree grows 2 * 4 = 8 meters in 4 days.

    The 4th tree grows 1 meter more per day than the 3rd, so its rate is 3 meters per day and it grows 3 * 4 = 12 meters.

    The total is 4 + 8 + 8 + 12 = 32 meters.

    #### 32'
- user: 'Big Dig Mining Company mines three different types of ore: copper, iron, and nickel. Across all their mines, 10% of their output is nickel, 60% is iron, and the rest is copper. They mine 720 tons of nickel a day. How many tons of copper does Big Dig Mining Company mine daily?'
  assistant: 'Nickel makes up 10% of the total output.

    If 10% is 720 tons, then the total output is 720 / 0.1 = 7200 tons.

    Iron is 60%, so copper is the rest: 100% - 10% - 60% = 30%.

    That means the copper output is 0.3 * 7200 = 2160 tons.

    So Big Dig mines 2160 tons of copper each day.

    #### 2160'
- user: Colston knows that his teacher loves drinking coffee and one day wants to see how much she drinks each week. He sees that she has a 20-ounce thermos and when she makes her coffee she pours a 1/2 cup of milk in, and then fills the coffee to the top. She does this twice a day. After the five-day school week, he decides to tell her, and when she hears how much coffee she drinks, she decides to drink 1/4 of what she normally drinks. How many ounces of coffee does she now drink a week?
  assistant: 'Since 1 cup = 8 ounces, 1/2 cup of milk is 4 ounces.

    Each thermos holds 20 ounces, so each thermos contains 20 - 4 = 16 ounces of coffee.

    She fills the thermos twice a day, so she drinks 16 * 2 = 32 ounces of coffee per day.

    Over 5 school days, she normally drinks 32 * 5 = 160 ounces per week.

    Now she drinks 1/4 of that, so she drinks 160 / 4 = 40 ounces per week.

    #### 40'
- user: Under optimal wind conditions, the use of two sails brings the ship to the speed of 50 knots, whereas under the same conditions, the use of one sail brings her ship to the speed of 25 knots. A knot is a nautical term for speed equal to 1 nautical mile per hour, and one nautical mile equals 1.15 land miles. If she travels in her sailboat under optimal wind conditions for 4 hours with one sail and then for another 4 hours with two sails, what is the total distance, in land miles, that she will travel?
  assistant: 'With one sail, the speed is 25 knots, so in 4 hours she travels 25 * 4 = 100 nautical miles.

    With two sails, the speed is 50 knots, so in 4 hours she travels 50 * 4 = 200 nautical miles.

    Her total distance is 100 + 200 = 300 nautical miles.

    Since 1 nautical mile equals 1.15 land miles, the total in land miles is 300 * 1.15 = 345.

    So she travels 345 land miles in total.

    #### 345'
