      The nurses used 38 bandages on the first day, 38 - 10 = <<38-10=28>>28 on the second day, and 50 / 2 = <<50/2=25>>25 on the third day.
      They ordered 50 + 100 = <<50+100=150>>150 new bandages and used 38 + 28 + 25 = <<38+28+25=91>>91 bandages total.
      So the starting amount was 78 - 150 + 91 = <<78-150+91=19>>19 bandages.
      #### 19

