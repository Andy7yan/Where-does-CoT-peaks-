- user: A robe takes 2 bolts of blue fiber and half that much white fiber. How many bolts in total does it take?
  assistant: |-
    The robe uses 2 bolts of blue fiber.
    Half of 2 is 2 / 2 = 1 bolt of white fiber.
    Now add the blue fiber and the white fiber.
    That gives 2 + 1 = 3 bolts.
    So the robe takes 3 bolts in total.
    #### 3
- user: James decides to run 3 sprints 3 times a week. He runs 60 meters each sprint. How many total meters does he run a week?
  assistant: |-
    James runs 3 sprints each time.
    He does that 3 times a week.
    So he runs 3 * 3 = 9 sprints each week.
    Each sprint is 60 meters.
    So the total distance is 9 * 60 = 540 meters.
    #### 540
- user: Tracy used a piece of wire 4 feet long to support tomato plants in the garden. The wire was cut into pieces 6 inches long. How many pieces did she obtain?
  assistant: |-
    The wire is 4 feet long.
    Since 1 foot = 12 inches, the wire length is 12 * 4 = 48 inches.
    Each piece is 6 inches long.
    So the number of pieces is 48 / 6 = 8.
    Tracy obtains 8 pieces of wire.
    #### 8
- user: Marie ordered one chicken meal that costs $12, 5 packs of milk that costs $3 each, 4 apples that cost $1.50 each, and some boxes of pizza. Marie paid a total of $50. How many boxes of pizza did Marie order if each box costs $8.50?
  assistant: |-
    The 5 packs of milk cost 5 * 3 = 15 dollars.
    The 4 apples cost 4 * 1.5 = 6 dollars.
    The chicken meal, milk, and apples cost 12 + 15 + 6 = 33 dollars.
    So the pizza cost is 50 - 33 = 17 dollars.
    Each pizza box costs 8.5 dollars.
    That gives 17 / 8.5 = 2 boxes of pizza.
    #### 2
- user: Gunter is trying to count the jelly beans in a jar. He asks his friends how many they think are in the jar. One says 80. Another says 20 more than half the first one. A third says 25% more than the first one. What is their average guess?
  assistant: |-
    The 1st guess is 80.
    Half of 80 is 80 / 2 = 40, so the 2nd guess is 20 + 40 = 60.
    The 3rd guess is 25% more than 80, so it is 80 * 1.25 = 100.
    The total of the 3 guesses is 80 + 60 + 100 = 240.
    The average guess is 240 / 3 = 80.
    That means their average guess is 80.
    #### 80
- user: When Freda cooks canned tomatoes into sauce, they lose half their volume. Each 16 ounce can of tomatoes that she uses contains three tomatoes. Freda's last batch of tomato sauce made 32 ounces of sauce. How many tomatoes did Freda use?
  assistant: |-
    The sauce ends at 32 ounces.
    Since the tomatoes lose half their volume, the starting amount is 32 * 2 = 64 ounces.
    Each can holds 16 ounces, so Freda used 64 / 16 = 4 cans.
    Each can contains 3 tomatoes.
    So Freda used 4 * 3 = 12 tomatoes.
    That means the answer is 12.
    #### 12
- user: John buys twice as many red ties as blue ties. The red ties cost 50% more than blue ties. He spent $200 on blue ties that cost $40 each. How much did he spend on ties?
  assistant: |-
    John spends 200 dollars on blue ties at 40 dollars each, so he buys 200 / 40 = 5 blue ties.
    He buys twice as many red ties, so he buys 5 * 2 = 10 red ties.
    The red ties cost 50% more than 40 dollars, so each red tie costs 40 * 1.5 = 60 dollars.
    So he spends 10 * 60 = 600 dollars on red ties.
    Add the blue-tie spending: 200 + 600 = 800 dollars.
    John spends 800 dollars on ties in total.
    #### 800
- user: A football team played 22 games. They won 8 more than they lost. How many did they win?
  assistant: |-
    Let the number of losses be L.
    Then the number of wins is L + 8.
    The team played 22 games, so L + (L + 8) = 22.
    That gives 2 * L + 8 = 22.
    So wins = 22 - 7 = 15.
    #### 15
