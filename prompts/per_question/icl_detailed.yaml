  Solve the user's problem clearly and finish with a new line in the form "#### <number>".
few_shot:
- user: A robe takes 2 bolts of blue fiber and half that much white fiber. How many bolts in total does it take?
  assistant: |-
    The robe uses 2 bolts of blue fiber.
    The white fiber is half as much as the blue fiber.
    Half of 2 bolts is 2 / 2 = 1 bolt.
    Now combine the blue fiber and the white fiber.
    That gives 2 + 1 = 3 bolts in total.
    So the robe takes 3 bolts of fiber.
    The total number of bolts is 3.
    #### 3
- user: James decides to run 3 sprints 3 times a week. He runs 60 meters each sprint. How many total meters does he run a week?
  assistant: |-
    James runs 3 sprints each time.
    He does this 3 times in a week.
    So the total number of sprints is 3 * 3 = 9.
    Each sprint is 60 meters long.
    Now multiply the number of sprints by the distance per sprint.
    That gives 9 * 60 = 540 meters.
    So James runs 540 meters in a week.
    #### 540
- user: Tracy used a piece of wire 4 feet long to support tomato plants in the garden. The wire was cut into pieces 6 inches long. How many pieces did she obtain?
  assistant: |-
    The wire is 4 feet long.
    Each foot has 12 inches.
    So the full wire length is 12 * 4 = 48 inches.
    Each piece is cut to 6 inches.
    Now divide the total length by the length of each piece.
    That gives 48 / 6 = 8 pieces.
    So Tracy obtains 8 pieces.
    #### 8
- user: Marie ordered one chicken meal that costs $12, 5 packs of milk that costs $3 each, 4 apples that cost $1.50 each, and some boxes of pizza. Marie paid a total of $50. How many boxes of pizza did Marie order if each box costs $8.50?
  assistant: |-
    The chicken meal costs 12 dollars.
    The 5 packs of milk cost 5 * 3 = 15 dollars.
    The 4 apples cost 4 * 1.5 = 6 dollars.
    Add those known items: 12 + 15 + 6 = 33 dollars.
    Subtract from the total paid: 50 - 33 = 17 dollars for pizza.
    Each pizza box costs 8.5 dollars.
    So the number of pizza boxes is 17 / 8.5 = 2.
    #### 2
- user: Gunter is trying to count the jelly beans in a jar. He asks his friends how many they think are in the jar. One says 80. Another says 20 more than half the first one. A third says 25% more than the first one. What is their average guess?
  assistant: |-
    The 1st friend guesses 80.
    For the 2nd friend, half of 80 is 80 / 2 = 40.
    So the 2nd guess is 20 + 40 = 60.
    For the 3rd friend, 25% more than 80 is 80 * 1.25 = 100.
    Now add all 3 guesses: 80 + 60 + 100 = 240.
    Divide by 3 to get the average: 240 / 3 = 80.
    So their average guess is 80 jelly beans.
    The answer is 80.
    #### 80
- user: When Freda cooks canned tomatoes into sauce, they lose half their volume. Each 16 ounce can of tomatoes that she uses contains three tomatoes. Freda's last batch of tomato sauce made 32 ounces of sauce. How many tomatoes did Freda use?
  assistant: |-
    Freda ends with 32 ounces of sauce.
    The tomatoes lose half their volume when cooked.
    So the starting tomato volume is 32 * 2 = 64 ounces.
    Each can contains 16 ounces.
    That means Freda used 64 / 16 = 4 cans.
    Each can contains 3 tomatoes.
    So Freda used 4 * 3 = 12 tomatoes in total.
    The answer is 12 tomatoes.
    #### 12
- user: John buys twice as many red ties as blue ties. The red ties cost 50% more than blue ties. He spent $200 on blue ties that cost $40 each. How much did he spend on ties?
  assistant: |-
    John spends 200 dollars on blue ties.
    Each blue tie costs 40 dollars, so he buys 200 / 40 = 5 blue ties.
    He buys twice as many red ties, so he buys 5 * 2 = 10 red ties.
    A red tie costs 50% more than 40 dollars, so each red tie costs 40 * 1.5 = 60 dollars.
    Now find the red-tie spending: 10 * 60 = 600 dollars.
    Add the blue-tie spending: 200 + 600 = 800 dollars.
    So John spends 800 dollars on all ties.
    The total is 800 dollars.
    #### 800
- user: A football team played 22 games. They won 8 more than they lost. How many did they win?
  assistant: |-
    Let the number of losses be L.
    The number of wins is 8 more, so wins = L + 8.
    The total number of games is 22.
    So L + (L + 8) = 22.
    Combine terms to get 2 * L + 8 = 22.
    Subtract 8 to get 2 * L = 14.
    Then L = 14 / 2 = 7 and wins = 7 + 8 = 15.
    The team won 15 games.
    #### 15
user_template: '{question}'
