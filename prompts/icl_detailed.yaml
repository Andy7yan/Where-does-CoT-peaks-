      Those 6 dogs each bring in 20 dollars, so the money from the 60-minute walks is 6 * 20 = <<6*20=120>>120 dollars.
      Johnny works 4 hours per day total.
      After spending 2 hours on the 60-minute walks, he has 4 - 2 = <<4-2=2>>2 hours left.
      Two hours is 120 minutes.
      A 30-minute walk fits into that time 120 / 30 = <<120/30=4>>4 times.
      Each such walk handles 3 dogs, so he can walk 4 * 3 = <<4*3=12>>12 dogs on 30-minute walks.
      Those dogs bring in 12 * 15 = <<12*15=180>>180 dollars.
      So Johnny makes 120 + 180 = <<120+180=300>>300 dollars per day.
      In 5 days, he makes 300 * 5 = <<300*5=1500>>1500 dollars.
      #### 1500

  - user: "There are 360 balls in the ball pit. If a quarter of the balls in the ball pit are red and a fifth of the remaining balls are blue. How many of the balls are neither red nor blue?"
    assistant: |
      Start with 360 balls.
      A quarter of them are red, so the number of red balls is 360 * 1/4 = <<360*(1/4)=90>>90.
      Remove the red balls from the total: 360 - 90 = <<360-90=270>>270 balls remain.
      A fifth of the remaining 270 balls are blue.
      So the number of blue balls is 270 * 1/5 = <<270*(1/5)=54>>54.
      The balls that are neither red nor blue are the ones left after removing both red and blue balls.
      360 - 90 - 54 = <<360-90-54=216>>216.
      #### 216

  - user: "Mason is mixing up some salad dressing. He takes a bowl that holds 150 ml and fills it 2/3rds with oil and 1/3rd with vinegar. The oil weighs 5 g/ml and the vinegar weighs 4 g/ml. How many grams does the salad dressing weigh?"
