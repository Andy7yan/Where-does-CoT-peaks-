      Oil weighs 5 grams per ml, so 100 ml of oil weighs 100 * 5 = <<100*5=500>>500 grams.
      Vinegar weighs 4 grams per ml, so 50 ml of vinegar weighs 50 * 4 = <<50*4=200>>200 grams.
      Add the two weights together to find the weight of the whole dressing.
      500 + 200 = <<500+200=700>>700 grams.
      #### 700

